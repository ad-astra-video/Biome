name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Frontend: Electron / renderer / main process (TypeScript + React).
  # Source under `src/`, `electron/`, top-level config files.
  # ──────────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint frontend (Prettier + tsc)
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Linux: reuse the shared build-env script for Node — keeps the
      # Node version in sync with the Docker image and release workflow.
      - name: Set up build environment
        if: runner.os == 'Linux'
        run: sudo ./build/appimage/setup-build-env.sh

      # Windows: no shared script yet; native setup.
      - name: Setup Node.js
        if: runner.os == 'Windows'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

  # ──────────────────────────────────────────────────────────────────
  # Backend: Python WorldEngine server under `server-components/`.
  # Three checks, matching the local trio in CONTRIBUTING.md:
  #   uvx ruff check .          # lint
  #   uvx ruff format --check . # formatter audit (no rewrites in CI)
  #   uvx basedpyright .        # strict type-check
  # basedpyright needs the project venv to resolve torch / world_engine
  # / etc., so we run `uv sync` first. The lockfile is intentionally
  # untracked, so the cache is keyed on `pyproject.toml`; uv resolves
  # fresh on each pyproject change but cached wheel downloads stay warm
  # in between.
  # ──────────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint backend (ruff + basedpyright)
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: server-components
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: server-components/pyproject.toml

      - name: Run ruff lint
        run: uvx ruff check .

      - name: Run ruff format check
        run: uvx ruff format --check .

      - name: Sync project dependencies
        run: uv sync

      - name: Run basedpyright
        run: uvx basedpyright .

      # Drift gate: `src/types/protocol.generated.ts` must match what the
      # codegen would produce from the current `server/protocol.py`. PRs
      # that change the protocol must include the regenerated TS file.
      - name: Verify protocol codegen is up to date
        run: uv run python scripts/codegen_ts.py --check

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Linux: same setup script used by the Docker build image.
      - name: Set up build environment
        if: runner.os == 'Linux'
        run: sudo ./build/appimage/setup-build-env.sh

      # Windows: no shared script yet; native setup.
      - name: Setup Node.js
        if: runner.os == 'Windows'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: biome-${{ matrix.platform }}
          path: out/make/**/*
